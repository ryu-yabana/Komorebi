<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOMOREBI — stable build</title>

<style>
body { background:#F2F0EB; color:#5A5A5A; font-family:serif; margin:0; display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
h1 { letter-spacing:0.6em; font-size:1.2rem; }
.subtitle { font-size:0.6rem; opacity:0.5; margin-bottom:10px; }
.signature { font-size:0.55rem; opacity:0.5; margin-bottom:20px; text-decoration:none; color:#5A5A5A; }

#canvas-container { width:100%; max-width:900px; aspect-ratio:16/9; background:#000; }
canvas { width:100%; height:100%; }

.controls { margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
button,input { font-size:0.6rem; }
button { padding:6px 10px; cursor:pointer; }
</style>
</head>

<body>
<h1>KOMOREBI</h1>
<div class="subtitle">LIGHT & SOUND</div>
<a href="https://github.io/ryu-yabana" target="_blank" class="signature">→ Ryu Yabana</a>

<div id="canvas-container"><canvas id="c"></canvas></div>

<div class="controls">
<input type="file" id="file" accept="audio/*">
<button id="play">PLAY</button>
<button id="restart">RESTART</button>
<button id="mode">MODE</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize(){
 canvas.width = canvas.offsetWidth;
 canvas.height = canvas.offsetHeight;
 init();
}
window.addEventListener('resize', resize);
resize();

// AUDIO
let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;
let data = new Uint8Array(analyser.frequencyBinCount);

let audio = new Audio();
let source = null;

// LOAD FILE
document.getElementById('file').onchange = e => {
 const file = e.target.files[0];
 if(!file) return;

 audio.src = URL.createObjectURL(file);
 audio.loop = true;
 audio.load();

 if(!source){
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
 }
};

// PLAY

document.getElementById('play').onclick = async () => {
 await audioCtx.resume();
 audio.play();
};

// RESTART

document.getElementById('restart').onclick = () => {
 audio.currentTime = 0;
};

// MODES
let mode = 0;
document.getElementById('mode').onclick = () => mode = (mode+1)%3;

// PARTICLES
let particles = [];
function init(){
 particles = [];
 for(let i=0;i<80;i++){
  particles.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height,
   vx:(Math.random()-0.5)*2,
   vy:(Math.random()-0.5)*2
  });
 }
}

// AUDIO LEVELS
function levels(){
 analyser.getByteFrequencyData(data);
 let sum = 0;
 for(let i=0;i<data.length;i++) sum += data[i];
 return sum / data.length / 255;
}

// DRAW
function draw(){
 requestAnimationFrame(draw);

 let level = levels();

 ctx.fillStyle = 'rgba(0,0,0,0.1)';
 ctx.fillRect(0,0,canvas.width,canvas.height);

 particles.forEach(p=>{
  let size = 5 + level * 50;

  ctx.beginPath();

  if(mode===0){
   ctx.arc(p.x,p.y,size,0,Math.PI*2);
   ctx.fillStyle = 'white';
   ctx.fill();
  }
  else if(mode===1){
   ctx.fillStyle='white';
   ctx.fillRect(p.x,p.y,size,size);
  }
  else if(mode===2){
   ctx.strokeStyle='white';
   ctx.moveTo(p.x,p.y);
   ctx.lineTo(p.x+size*2,p.y);
   ctx.stroke();
  }

  p.x += p.vx * (1+level*5);
  p.y += p.vy * (1+level*5);

  if(p.x<0||p.x>canvas.width) p.vx*=-1;
  if(p.y<0||p.y>canvas.height) p.vy*=-1;
 });
}

draw();
</script>
</body>
</html>
