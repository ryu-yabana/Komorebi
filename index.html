<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOMOREBI — visual study</title>
<style>
:root {
    --bg: #F2F0EB;
    --ui-text: #5A5A5A;
}

body {
    background: var(--bg);
    color: var(--ui-text);
    font-family: "Times New Roman", serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
}

h1 { font-weight: 200; letter-spacing: 0.6em; font-size: 1.2rem; margin-bottom: 5px; }
.subtitle { font-size: 0.6rem; letter-spacing: 0.3em; opacity: 0.5; margin-bottom: 30px; }

#canvas-container {
    width: 100%;
    max-width: 500px;
    aspect-ratio: 1 / 1;
    background: #000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
}

canvas { width: 100%; height: 100%; display: block; }

.ui-panel {
    width: 100%;
    max-width: 500px;
    margin-top: 40px;
}

.slider-group { margin-bottom: 20px; }
label { display: flex; justify-content: space-between; font-size: 0.65rem; letter-spacing: 0.1em; margin-bottom: 8px; }

input[type=range] {
    width: 100%;
    appearance: none;
    background: #E0DDD5;
    height: 1px;
}

input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 12px; height: 12px;
    background: var(--ui-text);
    border-radius: 50%;
}

.controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

button {
    background: none;
    border: 1px solid #CCC;
    padding: 8px 16px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    cursor: pointer;
}

.status { font-size: 0.6rem; margin-top: 20px; opacity: 0.4; text-align: center; }
</style>
</head>
<body>

<h1>KOMOREBI</h1>
<div class="subtitle">A STUDY OF LIGHT & TEXTURE</div>

<div id="canvas-container">
    <canvas id="visualizer"></canvas>
</div>

<div class="ui-panel">
    <div class="slider-group">
        <label>DENSITY <span>Particles</span></label>
        <input type="range" id="density" min="20" max="150" value="80">
    </div>
    <div class="slider-group">
        <label>DIFFUSION <span>Light Spread</span></label>
        <input type="range" id="diffusion" min="0" max="40" value="15">
    </div>
    <div class="slider-group">
        <label>MOMENTUM <span>Drift</span></label>
        <input type="range" id="speed" min="0.1" max="2" step="0.1" value="0.6">
    </div>

    <div class="controls">
        <button id="mic-btn">ENABLE AUDIO</button>
        <button id="palette-btn">SEASON</button>
    </div>

    <div id="status" class="status">Waiting for input...</div>
</div>

<script>
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
}
resize();
window.onresize = resize;

// Seasonal palettes (Dentouiro inspired)
const seasons = {
    spring: ['#F6C6C6', '#FADADD', '#F8E8EE'],
    summer: ['#A8DADC', '#457B9D', '#1D3557'],
    autumn: ['#D4A373', '#CCD5AE', '#E9EDC9'],
    winter: ['#E0FBFC', '#C2DFE3', '#5C6B73']
};

let activePalette = seasons.spring;

document.getElementById('palette-btn').onclick = () => {
    const keys = Object.keys(seasons);
    activePalette = seasons[keys[Math.floor(Math.random() * keys.length)]];
};

// Audio setup
let audioCtx, analyser, dataArray;
let audioEnabled = false;

document.getElementById('mic-btn').onclick = async () => {
    if (audioEnabled) return;
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);

    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    source.connect(analyser);
    audioEnabled = true;
};

// Particles
let particles = [];
function createParticles() {
    particles = [];
    const count = document.getElementById('density').value;
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 30 + 10,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            color: activePalette[Math.floor(Math.random() * activePalette.length)]
        });
    }
}
createParticles();
document.getElementById('density').oninput = createParticles;

function getAudioLevels() {
    if (!audioEnabled) return { low: 0, mid: 0, high: 0 };
    analyser.getByteFrequencyData(dataArray);

    let low = 0, mid = 0, high = 0;
    const len = dataArray.length;

    for (let i = 0; i < len; i++) {
        if (i < len * 0.33) low += dataArray[i];
        else if (i < len * 0.66) mid += dataArray[i];
        else high += dataArray[i];
    }

    return {
        low: low / len / 255,
        mid: mid / len / 255,
        high: high / len / 255
    };
}

function animate() {
    const speed = document.getElementById('speed').value;
    const blur = document.getElementById('diffusion').value;

    const audio = getAudioLevels();

    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.filter = `blur(${blur + audio.low * 20}px)`;

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size + audio.low * 40, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = 0.2 + audio.high;
        ctx.fill();

        p.x += p.vx * speed * (0.5 + audio.mid * 2);
        p.y += p.vy * speed * (0.5 + audio.mid * 2);

        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });

    ctx.globalAlpha = 1;
    ctx.filter = 'none';

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
